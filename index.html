<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Planets</title>
    <style>
        table {
            border: 1px solid rgb(140 140 140);
        }
        th,
        td {
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <h1>Planets</h1>
    <table>
        <tr>
            <th colspan="2"></th>
            <th>Name</th>
            <th>Mass(10<sup>24</sup>kg)</th>
            <th>Diameter (km)</th>
        </tr>
        <tr>
            <th rowspan="4" colspan="2">Terrestrial planets</th>
            <th>Mercury</th>
            <td>0.330</td>
            <td>4,879</td>
        </tr>
        <tr>
            <th>Venus</th>
            <td>4.87</td>
            <td>12,104</td>
        </tr>
        <tr>
            <th>Earth</th>
            <td>5.97</td>
            <td>12,756</td>
        </tr>
        <tr>
            <th>Mars</th>
            <td>0.642</td>
            <td>6,792</td>
        </tr>
        <tr>
            <th rowspan="4">Jovian planets</th>
            <th rowspan="2">Gas giants</th>
            <th>Jupiter</th>
            <td>1898</td>
            <td>142,984</td>
        </tr>
        <tr>
            <th>Satrurn</th>
            <td>568</td>
            <td>120,536</td>
        </tr>
        <tr>
            <th rowspan="2">Ice giants</th>
            <th>Uranus</th>
            <td>86.8</td>
            <td>51,118</td>
        </tr>
        <tr>
            <th>Neptune</th>
            <td>102</td>
            <td>49,528</td>
        </tr>
        <tr>
            <th colspan="2">Dwarf planets</th>
            <th>Pluto</th>
            <td>0.0146</td>
            <td>2,370</td>
        </tr>
    </table>
    <form>

    </form>
</body>
</html>
